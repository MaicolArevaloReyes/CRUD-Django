{% extends 'blog/base.html' %}

{% block content %}
    <div class="card p-4">
        <h2>{{ post.title }}</h2>
        <p class="text-muted">Por {{ post.author }} · {{ post.created_at|date:"d M Y" }}</p>
        <hr>
        <p>{{ post.content }}</p>
        <div class="mt-3 d-flex gap-2">
            <a href="{% url 'post-update' post.pk %}" class="btn btn-outline-secondary btn-sm">Editar</a>
            <a href="{% url 'post-delete' post.pk %}" class="btn btn-outline-danger btn-sm">Eliminar</a>
            <a href="{% url 'post-list' %}" class="btn btn-outline-dark btn-sm">Volver</a>
        </div>
    </div>
{% endblock %}
