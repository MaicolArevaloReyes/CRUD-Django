{% extends 'blog/base.html' %}

{% block content %}
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Posts</h2>
        {% if user.is_authenticated %}
            <a href="{% url 'post-create' %}" class="btn btn-dark">+ Nuevo post</a>
        {% endif %}
    </div>

    {% for post in object_list %}
        <div class="card mb-3">
            <div class="card-body">
                <h5 class="card-title">{{ post.title }}</h5>
                <p class="card-text text-muted">
                    Por {{ post.author }} · {{ post.created_at|date:"d M Y" }}
                </p>
                <a href="{% url 'post-detail' post.pk %}" class="btn btn-outline-dark btn-sm">Ver más</a>
            </div>
        </div>
    {% empty %}
        <p class="text-muted">No hay posts aún.</p>
    {% endfor %}
{% endblock %}
