{% extends 'blog/base.html' %}

{% block content %}
    <div class="card p-4 text-center" style="max-width: 500px; margin: auto;">
        <h4>¿Eliminar "{{ post.title }}"?</h4>
        <p class="text-muted">Esta acción no se puede deshacer.</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Sí, eliminar</button>
            <a href="{% url 'post-list' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
    </div>
{% endblock %}
