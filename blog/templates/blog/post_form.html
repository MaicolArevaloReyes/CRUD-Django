{% extends 'blog/base.html' %}

{% block content %}
    <div class="card p-4" style="max-width: 600px; margin: auto;">
        <h3 class="mb-4">{{ view.object|yesno:"Editar post,Nuevo post" }}</h3>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger small">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-dark w-100">Guardar</button>
        </form>
    </div>
{% endblock %}
